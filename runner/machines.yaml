defaults:
  target: x86-dev
  lock_scope: vm_global
  cpus_auto_ratio: 0.8
  memory_auto_ratio: 0.8
  memory_min_gib: 4

aliases:
  x86: x86-benchmark
  x86-dev: x86-dev
  x86-benchmark: x86-benchmark
  arm64: aws-arm64
  aws: aws-arm64

default_targets:
  vm-shell: x86-dev
  vm-test: x86-dev
  vm-selftest: x86-dev
  vm-static-test: x86-dev
  vm-negative-test: x86-dev
  vm-micro-smoke: x86-benchmark
  vm-micro: x86-benchmark
  vm-corpus: x86-benchmark
  vm-e2e: x86-benchmark

targets:
  x86-dev:
    backend: vng
    arch: x86_64
    executable: runner/scripts/vng-wrapper.sh
    memory: 16G
    lock_scope: vm_global

  x86-debug-tcg:
    backend: vng
    arch: x86_64
    executable: runner/scripts/vng-wrapper.sh
    args:
    - --disable-kvm
    memory: 16G
    lock_scope: vm_global

  x86-benchmark:
    backend: vng
    arch: x86_64
    executable: runner/scripts/vng-wrapper.sh
    args:
    - --disable-kvm
    cpus: 1
    memory: 16G
    lock_scope: vm_global

  local-arm64-qemu:
    backend: qemu
    arch: arm64
    executable: qemu-system-aarch64
    lock_scope: vm_global

  aws-arm64:
    backend: ssh
    arch: arm64
    executable: runner/scripts/aws_arm64.sh
    lock_scope: vm_global
