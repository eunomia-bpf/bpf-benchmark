# Input generator specifications.
# Each entry drives a parameterised generator in input_generators.py.
# Keys:
#   kind          – which generic builder to use (see input_generators.py)
#   count / seed / salt / stride / ... – parameters forwarded to the builder

# ---------------------------------------------------------------------------
# kind: simple_lcg_u64_ii  (also aliased as dep_chain / multi_acc / stride_load /
#                            large_mixed / load_isolation as historical aliases)
#   header: pack("<II", count, header_b)   [header_b defaults to seed]
#   body:   N u64s: _lcg(state) then  value = state ^ ((i+index_offset)*mixing_salt)
#                   optionally ^ seed  (xor_seed: true)
#   For load_isolation (no mixing), set mixing_salt: 0  and  header_b: 0
# ---------------------------------------------------------------------------
dep_chain_short:
  kind: dep_chain
  count: 64
  seed:  0x13572468
  salt:  0xDEADBEEFCAFE0123
  mixing_salt: 0x9E3779B97F4A7C15
  index_offset: 1
  xor_seed: true

dep_chain_long:
  kind: dep_chain
  count: 256
  seed:  0x24681357
  salt:  0x0123456789ABCDEF
  mixing_salt: 0x9E3779B97F4A7C15
  index_offset: 1
  xor_seed: true

