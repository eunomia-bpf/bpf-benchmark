# ---------------------------------------------------------------------------
# kind: lcg_u64_ii  — <II header> + N u64s
#   state = lcg(state ^ (i+1)*salt1); value = state ^ (i+offset)*salt2 [^ seed]
# ---------------------------------------------------------------------------
bitcount:
  kind: lcg_u64_ii
  count: 256
  seed:  0x00C0FFEE
  initial_state: 0x123456789ABCDEF0
  salt1: 0x9E3779B97F4A7C15
  salt2: 0x9E3779B97F4A7C15
  index_offset: 1
  xor_seed: false

