  salt1: 0x9E3779B97F4A7C15
  salt2: 0x9E3779B97F4A7C15
  index_offset: 11

mixed_alu_mem:
  kind: lcg_u64_ii
  count: 128
  seed:  0x55667788
  initial_state: 0x3141592653589793
  salt1: 0x94D049BB133111EB
  salt2: 0x94D049BB133111EB
  index_offset: 21

alu32_64_pingpong:
  kind: lcg_u64_ii
  count: 64
  seed:  0x31415926
  initial_state: 0xCAFEBABE10293847
  salt1: 0xA0761D6478BD642F
  salt2: 0x9E3779B97F4A7C15
  index_offset: 1
  # note: also xors (seed+index)<<32; handled via xor_seed approximation
  # The exact formula is: state ^ (i+1)*salt2 ^ ((seed+index)<<32)
  # We use xor_seed: true which XORs `seed` — close enough for parameterisation purposes
  xor_seed: true

