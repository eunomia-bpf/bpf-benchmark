repos:
  - name: xdp-examples
    url: https://github.com/xdp-project/bpf-examples.git
    branch: main
    harvest_globs:
      - "**/*.bpf.c"
      - "**/*_kern.c"
      - "**/*_bpf.c"
    compile_include_dirs:
      - .
      - headers
      - include
      - lib

  - name: xdp-tools
    url: https://github.com/xdp-project/xdp-tools.git
    branch: main
    harvest_globs:
      - "**/*.bpf.c"
      - "**/*_kern.c"
      - "**/*_bpf.c"
    compile_include_dirs:
      - .
      - headers
      - lib
      - lib/libxdp
      - lib/common
      - xdp-loader
      - xdp-filter
      - xdp-dump

  - name: xdp-tutorial
    url: https://github.com/xdp-project/xdp-tutorial.git
    branch: main
    harvest_globs:
      - "**/*.bpf.c"
      - "**/*_kern.c"
      - "**/*_bpf.c"
    compile_include_dirs:
      - .
      - common
      - headers
      - packet-solutions
      - tracing01-xdp-simple
      - advanced01-xdp-tc-interact

  - name: bcc
    url: https://github.com/iovisor/bcc.git
    branch: master
    sparse_paths:
      - libbpf-tools
    harvest_globs:
      - libbpf-tools/*.bpf.c
    compile_include_dirs:
      - .
      - libbpf-tools
      - libbpf-tools/compat

  - name: katran
    url: https://github.com/facebookincubator/katran.git
    branch: main
    sparse_paths:
      - CMakeLists.txt
      - build
      - build_bpf_modules_opensource.sh
      - build_katran.sh
      - cmake
      - example_grpc
      - katran/decap
      - katran/lib
    harvest_globs:
      - katran/lib/**/*.bpf.c
    compile_include_dirs:
      - .
      - katran/lib
      - katran/lib/bpf
      - katran/lib/linux_includes
      - katran/lib/linux_includes/uapi

  - name: tetragon
    url: https://github.com/cilium/tetragon.git
    branch: main
    harvest_globs:
      - bpf/**/*.c
    exclude_globs:
      - bpf/test/**/*.c
      - bpf/tests/**/*.c
      - bpf/windows/**/*.c
    compile_include_dirs:
      - .
      - bpf
      - bpf/lib
      - bpf/process
      - bpf/cgroup

  - name: cilium
    url: https://github.com/cilium/cilium.git
    branch: main
    sparse_paths:
      - bpf
    harvest_globs:
      - bpf/**/*.c
    exclude_globs:
      - bpf/tests/**/*.c
    compile_include_dirs:
      - .
      - bpf
      - bpf/include
      - bpf/lib

  - name: netbird
    url: https://github.com/netbirdio/netbird.git
    branch: main
    sparse_paths:
      - client/internal/ebpf/ebpf/src
    harvest_globs:
      - client/internal/ebpf/ebpf/src/prog.c
    compile_include_dirs:
      - .
      - client/internal/ebpf/ebpf/src
    forced_includes:
      - vendor/linux-framework/tools/include/linux/types.h
      - corpus/include/netbird_legacy_bpf_map_def.h

  - name: KubeArmor
    url: https://github.com/kubearmor/KubeArmor.git
    branch: main
    harvest_globs: []
    compile_include_dirs:
      - .

  - name: calico
    url: https://github.com/projectcalico/calico.git
    branch: master
    harvest_globs: []
    compile_include_dirs:
      - .

  - name: coroot-node-agent
    url: https://github.com/coroot/coroot-node-agent.git
    branch: main
    harvest_globs: []
    compile_include_dirs:
      - .

  - name: datadog-agent
    url: https://github.com/DataDog/datadog-agent.git
    branch: main
    harvest_globs: []
    compile_include_dirs:
      - .

  - name: opentelemetry-ebpf-profiler
    url: https://github.com/open-telemetry/opentelemetry-ebpf-profiler.git
    branch: main
    harvest_globs: []
    compile_include_dirs:
      - .

  - name: tracee
    url: https://github.com/aquasecurity/tracee.git
    branch: main
    harvest_globs: []
    compile_include_dirs:
      - .

  - name: bpftrace
    url: https://github.com/bpftrace/bpftrace.git
    branch: master
    harvest_globs: []
    compile_include_dirs:
      - .

  - name: tubular
    url: https://github.com/cloudflare/tubular.git
    branch: main
    harvest_globs: []
    compile_include_dirs:
      - .

  - name: libbpf-bootstrap
    url: https://github.com/libbpf/libbpf-bootstrap.git
    branch: master
    sparse_paths:
      - examples/c
    harvest_globs:
      - examples/c/*.bpf.c
    compile_include_dirs:
      - .
      - examples/c

  - name: linux-selftests
    url: https://github.com/torvalds/linux.git
    branch: master
    sparse_paths:
      - tools/testing/selftests/bpf
      - tools/lib
      - tools/include
      - include
      - arch/x86/include
    harvest_globs:
      - tools/testing/selftests/bpf/progs/*.c
    compile_include_dirs:
      - .
      - tools/testing/selftests/bpf
      - tools/testing/selftests/bpf/progs
      - tools/lib
      - tools/lib/bpf
      - tools/include
      - tools/include/uapi
      - include
      - include/uapi
      - arch/x86/include
      - arch/x86/include/uapi
