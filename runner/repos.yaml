repos:
  - name: xdp-examples
    url: https://github.com/xdp-project/bpf-examples.git
    branch: main
    harvest_globs:
      - "**/*.bpf.c"
      - "**/*_kern.c"
      - "**/*_bpf.c"
    compile_include_dirs:
      - .
      - headers
      - include
      - lib

  - name: xdp-tools
    url: https://github.com/xdp-project/xdp-tools.git
    branch: main
    harvest_globs:
      - "**/*.bpf.c"
      - "**/*_kern.c"
      - "**/*_bpf.c"
    compile_include_dirs:
      - .
      - headers
      - lib
      - lib/libxdp
      - lib/common
      - xdp-loader
      - xdp-filter
      - xdp-dump

  - name: xdp-tutorial
    url: https://github.com/xdp-project/xdp-tutorial.git
    branch: main
    harvest_globs:
      - "**/*.bpf.c"
      - "**/*_kern.c"
      - "**/*_bpf.c"
    compile_include_dirs:
      - .
      - common
      - headers
      - packet-solutions
      - tracing01-xdp-simple
      - advanced01-xdp-tc-interact

  - name: bcc
    url: https://github.com/iovisor/bcc.git
    branch: master
    sparse_paths:
      - libbpf-tools
    harvest_globs:
      - libbpf-tools/*.bpf.c
    compile_include_dirs:
      - .
      - libbpf-tools
      - libbpf-tools/compat

  - name: scx
    url: https://github.com/sched-ext/scx.git
    branch: main
    harvest_globs: []
    compile_include_dirs:
      - .
    cargo_packages:
      - scx_bpfland
      - scx_rusty
      - scx_lavd
      - scx_flash
    promoted_objects:
      scx_bpfland: corpus/build/scx/scx_bpfland_main.bpf.o
      scx_rusty: corpus/build/scx/scx_rusty_main.bpf.o
      scx_lavd: corpus/build/scx/scx_lavd_main.bpf.o
      scx_flash: corpus/build/scx/scx_flash_main.bpf.o
    e2e_binary:
      path: target/release/scx_rusty

  - name: katran
    url: https://github.com/facebookincubator/katran.git
    branch: main
    sparse_paths:
      - katran/lib
    harvest_globs:
      - katran/lib/**/*.bpf.c
    compile_include_dirs:
      - .
      - katran/lib
      - katran/lib/bpf
      - katran/lib/linux_includes
      - katran/lib/linux_includes/uapi

  - name: tetragon
    url: https://github.com/cilium/tetragon.git
    branch: main
    sparse_paths:
      - bpf
    harvest_globs:
      - bpf/**/*.c
    exclude_globs:
      - bpf/test/**/*.c
      - bpf/tests/**/*.c
      - bpf/windows/**/*.c
    compile_include_dirs:
      - .
      - bpf
      - bpf/lib
      - bpf/process
      - bpf/cgroup

  - name: cilium
    url: https://github.com/cilium/cilium.git
    branch: main
    sparse_paths:
      - bpf
    harvest_globs:
      - bpf/**/*.c
    exclude_globs:
      - bpf/tests/**/*.c
    compile_include_dirs:
      - .
      - bpf
      - bpf/include
      - bpf/lib

  - name: netbird
    url: https://github.com/netbirdio/netbird.git
    branch: main
    sparse_paths:
      - client/internal/ebpf/ebpf/src
    harvest_globs:
      - client/internal/ebpf/ebpf/src/prog.c
    compile_include_dirs:
      - .
      - client/internal/ebpf/ebpf/src
    forced_includes:
      - vendor/linux-framework/tools/include/linux/types.h
      - corpus/include/netbird_legacy_bpf_map_def.h

  - name: systemd
    url: https://github.com/systemd/systemd.git
    branch: main
    sparse_paths:
      - src/core/bpf
      - src/network/bpf
      - src/nsresourced/bpf
      - src/shared
    harvest_globs:
      - src/core/bpf/**/*.bpf.c
      - src/network/bpf/**/*.bpf.c
      - src/nsresourced/bpf/**/*.bpf.c
    compile_include_dirs:
      - .
      - src
      - src/core
      - src/core/bpf
      - src/shared
      - src/network/bpf/sysctl-monitor
      - src/nsresourced/bpf/userns-restrict
      - src/core/bpf/bind-iface
      - src/core/bpf/restrict-fs
      - src/core/bpf/restrict-ifaces
      - src/core/bpf/socket-bind
    forced_includes:
      - vendor/linux-framework/tools/include/linux/types.h

  - name: KubeArmor
    url: https://github.com/kubearmor/KubeArmor.git
    branch: main
    harvest_globs: []
    compile_include_dirs:
      - .

  - name: calico
    url: https://github.com/projectcalico/calico.git
    branch: master
    harvest_globs: []
    compile_include_dirs:
      - .

  - name: coroot-node-agent
    url: https://github.com/coroot/coroot-node-agent.git
    branch: main
    harvest_globs: []
    compile_include_dirs:
      - .

  - name: datadog-agent
    url: https://github.com/DataDog/datadog-agent.git
    branch: main
    harvest_globs: []
    compile_include_dirs:
      - .

  - name: loxilb
    url: https://github.com/loxilb-io/loxilb-ebpf.git
    branch: main
    harvest_globs: []
    compile_include_dirs:
      - .

  - name: opentelemetry-ebpf-profiler
    url: https://github.com/open-telemetry/opentelemetry-ebpf-profiler.git
    branch: main
    harvest_globs: []
    compile_include_dirs:
      - .

  - name: suricata
    url: https://github.com/OISF/suricata.git
    branch: main
    harvest_globs: []
    compile_include_dirs:
      - .

  - name: tracee
    url: https://github.com/aquasecurity/tracee.git
    branch: main
    harvest_globs: []
    compile_include_dirs:
      - .

  - name: tubular
    url: https://github.com/cloudflare/tubular.git
    branch: main
    harvest_globs: []
    compile_include_dirs:
      - .

  - name: libbpf-bootstrap
    url: https://github.com/libbpf/libbpf-bootstrap.git
    branch: master
    sparse_paths:
      - examples/c
    harvest_globs:
      - examples/c/*.bpf.c
    compile_include_dirs:
      - .
      - examples/c

  - name: linux-selftests
    url: https://github.com/torvalds/linux.git
    branch: master
    sparse_paths:
      - tools/testing/selftests/bpf
      - tools/lib
      - tools/include
      - include
      - arch/x86/include
    harvest_globs:
      - tools/testing/selftests/bpf/progs/*.c
    compile_include_dirs:
      - .
      - tools/testing/selftests/bpf
      - tools/testing/selftests/bpf/progs
      - tools/lib
      - tools/lib/bpf
      - tools/include
      - tools/include/uapi
      - include
      - include/uapi
      - arch/x86/include
      - arch/x86/include/uapi
