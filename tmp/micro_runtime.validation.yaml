suite_name: micro_runtime
paths:
  program_dir: micro/programs
toolchains:
  llvmbpf:
    root: vendor/llvmbpf
  libbpf:
    root: vendor/libbpf
  bpftool:
    root: vendor/bpftool
build:
  commands:
    micro_exec:
    - make
    - -C
    - micro
    - micro_exec
    programs:
    - make
    - -C
    - micro
    - programs
    bpftool:
    - make
    - -C
    - micro
    - vendor_bpftool
  runner_binary: micro/build/runner/micro_exec
  bpftool_binary: micro/build/vendor/bpftool/bpftool
defaults:
  iterations: 10
  warmups: 2
  repeat: 200
  runtimes:
  - llvmbpf
  - kernel
  output: micro/results/runtime.latest.json
benchmark_defaults:
  io_mode: map
runtimes:
- name: llvmbpf
  label: llvmbpf LLVM JIT
  mode: llvmbpf
  repeat: 200
  aliases:
  - llvm
- name: kernel
  label: kernel eBPF
  mode: kernel
  repeat: 200
  sudo: true
benchmarks:
- name: atomic_counter_xadd
  description: Atomically increment array-map counters and fold prior plus final values
  category: map-runtime
  family: atomic-op
  level: xadd
  hypothesis: Atomic map-value updates should expose lock-xadd lowering and runtime
    map-value access overhead
  base_name: atomic_counter_xadd
  kernel_input_size: 264
  input_generator: atomic_counter_xadd
  expected_result: 12907746159561469530
  tags:
  - map
  - atomic
  - runtime
