suite_name: micro_branch_distribution_predictable
paths:
  program_dir: micro/programs
toolchains:
  llvmbpf:
    root: vendor/llvmbpf
  libbpf:
    root: vendor/libbpf
  bpftool:
    root: vendor/bpftool
build:
  commands:
    micro_exec:
    - make
    - -C
    - micro
    - micro_exec
    programs:
    - make
    - -C
    - micro
    - programs
    bpftool:
    - make
    - -C
    - micro
    - vendor_bpftool
  runner_binary: micro/build/runner/micro_exec
  bpftool_binary: micro/build/vendor/bpftool/bpftool
defaults:
  iterations: 10
  warmups: 2
  repeat: 200
  runtimes:
  - llvmbpf
  - kernel
  output: tmp/branch_distribution_predictable.json
benchmark_defaults:
  io_mode: staged
analysis:
  baseline_benchmark: null
runtimes:
- name: llvmbpf
  label: llvmbpf LLVM JIT
  mode: llvmbpf
  repeat: 200
  aliases:
  - llvm
- name: kernel
  label: kernel eBPF
  mode: kernel
  repeat: 200
  sudo: true
benchmarks:
- name: branch_layout
  description: Hot/cold branch skew for layout experiments
  category: control-flow
  family: branch-skew
  level: hot-cold
  hypothesis: Skewed branches should expose layout and prediction quality differences
  base_name: branch_layout
  kernel_input_size: 4104
  input_generator: branch_layout_predictable
  expected_result: null
  tags:
  - branch
  - layout
  - pure-jit
- name: branch_fanout_32
  description: Thirty-two-way sparse branch fanout with nontrivial per-arm work
  category: control-flow
  family: branch-fanout
  level: sparse-32
  hypothesis: Wide sparse fanout should stress branch layout and compare-ladder lowering
    beyond dense switch dispatch
  base_name: branch_fanout_32
  kernel_input_size: 516
  input_generator: branch_fanout_32_predictable
  expected_result: null
  tags:
  - branch
  - fanout
  - pure-jit
