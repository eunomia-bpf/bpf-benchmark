suite_name: micro

paths:
  program_dir: programs

toolchains:
  llvmbpf:
    root: ../vendor/llvmbpf
  libbpf:
    root: ../vendor/libbpf
  bpftool:
    root: ../vendor/bpftool

build:
  commands:
    micro_exec: [make, -C, ., micro_exec]
    programs: [make, -C, ., programs]
    bpftool: [make, -C, ., vendor_bpftool]
  runner_binary: build/runner/micro_exec
  bpftool_binary: build/vendor/bpftool/bpftool

defaults:
  iterations: 10
  warmups: 2
  repeat: 200
  runtimes: [llvmbpf, kernel]
  output: results/latest.json

runtimes:
  - name: llvmbpf
    label: llvmbpf LLVM JIT
    mode: llvmbpf
    repeat: 200
    aliases: [llvm]

  - name: kernel
    label: kernel eBPF
    mode: kernel
    repeat: 200
    sudo: true

benchmarks:
  - name: simple
    description: Return-only baseline
    category: pure-compute
    base_name: simple
    kernel_input_size: 64
    input_generator: simple
    expected_result: 12345678
    tags: [baseline, dual-runtime]

  - name: bitcount
    description: Kernighan popcount over generated u64 input
    category: pure-compute
    base_name: bitcount
    kernel_input_size: 2056
    input_generator: bitcount
    expected_result: 3035568289764064166
    tags: [bitops, dual-runtime]

  - name: binary_search
    description: Repeated search over sorted data
    category: pure-compute
    base_name: binary_search
    kernel_input_size: 392
    input_generator: binary_search
    expected_result: 126
    tags: [branch, search, dual-runtime]

  - name: checksum
    description: Internet checksum style reduction
    category: pure-compute
    base_name: checksum
    kernel_input_size: 1032
    input_generator: checksum
    expected_result: 0
    tags: [alu, memory, dual-runtime]

  - name: packet_parse
    description: Packet header parsing with bounds checks
    category: pure-compute
    base_name: packet_parse
    kernel_input_size: 4104
    input_generator: packet_parse
    expected_result: 1952576
    tags: [memory, parse, bounds, dual-runtime]

  - name: branch_layout
    description: Hot/cold branch skew for layout experiments
    category: factor-isolation-ready
    base_name: branch_layout
    kernel_input_size: 4104
    input_generator: branch_layout
    expected_result: 83277648
    tags: [branch, f6-ready, dual-runtime]
