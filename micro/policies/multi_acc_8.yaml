# Policy for multi_acc_8_xdp
# Scanner found: wide=2 (setup code, count+seed u32 reads), lea=2 (hot loop)
# Wide sites at insn 10+23 optimize the cold count/seed reads (run once).
# LEA sites at insn 155+158 are in the hot loop address calculations.

version: 3
program: 'multi_acc_8_xdp'
sites:
  - insn: 10
    family: wide
    pattern_kind: 'wide-load-2'
  - insn: 23
    family: wide
    pattern_kind: 'wide-load-2'
  - insn: 155
    family: lea
    pattern_kind: 'addr-calc'
  - insn: 158
    family: lea
    pattern_kind: 'addr-calc'
