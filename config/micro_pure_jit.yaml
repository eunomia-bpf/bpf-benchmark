  - name: multi_acc_8
    description: Eight-lane accumulator kernel with cross-lane mixing
    category: dependency-ilp
    family: multi-acc
    level: 8-lane
    hypothesis: Higher lane count should trade ILP gains against register pressure
    base_name: multi_acc_8
    kernel_input_size: 1032
    input_generator: multi_acc_8
    expected_result: 6524869553103642107
    tags: [compute, ilp, pure-jit]

  - name: fibonacci_iter
    description: Loop-heavy Fibonacci-style recurrence with bounded iteration count
    category: loop-shape
    family: recurrence
    level: long
    hypothesis: Scalar recurrence loops should narrow the gap by limiting exploitable ILP
    base_name: fibonacci_iter
    kernel_input_size: 16
    input_generator: fibonacci_iter
    expected_result: 3918857671957494287
    tags: [compute, loop, pure-jit]

  - name: fibonacci_iter_packet
    description: Packet-backed Fibonacci-style recurrence with bounded iteration count
    category: loop-shape
    family: recurrence
    level: long
    hypothesis: Removes staged input helper overhead to isolate the packet-fed recurrence loop shape
    base_name: fibonacci_iter_packet
    io_mode: packet
    kernel_input_size: 24
    input_generator: fibonacci_iter_packet
    expected_result: 3918857671957494287
    tags: [compute, loop, packet-backed, helper-free]

  - name: fixed_loop_small
    description: Short fixed-trip-count recurrence loop
    category: loop-shape
    family: fixed-loop
    level: small
    hypothesis: Short fixed loops should keep loop overhead visible relative to the loop body
    base_name: fixed_loop_small
    kernel_input_size: 16
