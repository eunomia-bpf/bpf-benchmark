build:
  bpftool_binary: micro/build/vendor/bpftool/bpftool
  commands:
    bpftool:
    - make
    - -C
    - micro
    - vendor_bpftool
    micro_exec:
    - make
    - -C
    - micro
    - micro_exec
    programs:
    - make
    - -C
    - micro
    - programs
  runner_binary: micro/build/runner/micro_exec
defaults:
  iterations: 10
  output: micro/results/pure_jit.latest.json
  repeat: 200
  runtimes:
  - llvmbpf
  - kernel
  warmups: 2
paths:
  program_dir: micro/programs
runtimes:
- aliases:
  - llvm
  label: llvmbpf LLVM JIT
  mode: llvmbpf
  name: llvmbpf
  repeat: 200
- label: kernel eBPF
  mode: kernel
  name: kernel
  repeat: 200
  sudo: true
- aliases:
  - kernel_recompile
  - recompile
  label: kernel eBPF + manifest recompile policy
  mode: kernel-recompile
  name: kernel-recompile
  repeat: 200
  sudo: true
suite_name: micro_staged_codegen
toolchains:
  bpftool:
    root: vendor/bpftool
  libbpf:
    root: vendor/libbpf
  llvmbpf:
    root: vendor/llvmbpf
