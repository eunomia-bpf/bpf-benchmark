# Focused Tetragon exec benchmark for the current e2e follow-up line.
# This enables the cgroup rate sensor path so execve_rate is expected to
# participate, and narrows both measurement and apply to the exec programs.

tetragon_extra_args:
  - --cgroup-rate
  - 1000,1s

target_programs:
  - execve_rate
  - event_execve

apply_programs:
  - execve_rate
  - event_execve

workloads:
  - name: stress_exec
    kind: exec_storm
    metric: bogo-ops/s
    description: stress-ng execve workload
    value: 2

measurement_duration_s: 30
smoke_duration_s: 8
preflight_duration_s: 5
require_program_activity: true
