# Tetragon exec benchmark.
# `execve_rate` remains a useful scan/apply target when the cgroup-rate
# sensor is enabled, but the workload's measurable hot path is still
# `event_execve`, so keep both programs in scope for activity gating and
# end-to-end comparison.

tetragon_extra_args:
  - --cgroup-rate
  - 1000,1s

target_programs:
  - execve_rate
  - event_execve

apply_programs:
  - execve_rate
  - event_execve

workloads:
  - name: stress_exec
    kind: exec_storm
    metric: bogo-ops/s
    description: stress-ng execve workload
    value: 2

measurement_duration_s: 30
smoke_duration_s: 8
preflight_duration_s: 5
require_program_activity: true
