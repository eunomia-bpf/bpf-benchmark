# BCC libbpf-tools E2E benchmark configuration
# Each tool is compiled from runner/repos/bcc/libbpf-tools/ and run as a real
# userspace binary that loads BPF programs into the kernel.
#
# workload_kind must be one of:
#   tcp_connect  -- curl-based HTTP loopback connects
#   block_io     -- explicit block read/write loop on a guest RAM disk
#   scheduler    -- scheduler-stress context-switch storm
#   exec_storm   -- stress-ng --exec execve storm
#   exec_loop    -- deterministic execve loop, optionally dropped to uid 65534
#   file_open    -- fio/stress-ng open-close file storm
#   vfs_create_write_fsync -- create/write/fsync/read/unlink loop on disk-backed temp files
#   bind_storm   -- tight loop of socket.bind() on loopback ephemeral ports

tools:
  - name: tcplife
    description: "TCP session lifespan tracking (IPv4/IPv6), struct field access, bswap, ntop, 3 maps"
    # On the current kernel/libbpf-tools build this tool exposes a single
    # inet_sock_set_state program instead of separate IPv4/IPv6 hooks.
    expected_programs: 1
    workload_kind: tcp_connect
    # tcplife needs at least one TCP session to fire; spawn_timeout_s covers
    # the time to see the first kernel attach acknowledgement in output.
    spawn_timeout_s: 15

  - name: biosnoop
    description: "Block I/O per-request latency tracing with disk/sector maps"
    expected_programs: 2
    workload_kind: block_io
    spawn_timeout_s: 15

  - name: runqlat
    description: "Run-queue latency histogram via sched tracepoints (3 programs)"
    expected_programs: 3
    workload_kind: scheduler
    spawn_timeout_s: 15

  - name: syscount
    description: "Syscall count/latency summary via raw_syscalls tracepoints"
    expected_programs: 2
    workload_kind: file_open
    spawn_timeout_s: 15
    tool_args: ["-L", "-i", "1"]

  - name: execsnoop
    description: "Process exec tracing via tracepoints, argv map lookups"
    expected_programs: 2
    workload_kind: exec_loop
    spawn_timeout_s: 15
    tool_args: ["-T", "-U", "-u", "65534"]

  - name: opensnoop
    description: "File open syscall tracing via tracepoints"
    expected_programs: 2
    workload_kind: file_open
    spawn_timeout_s: 15

  - name: capable
    description: "Capability call tracing via kprobe cap_capable, 41-entry string map"
    expected_programs: 1
    workload_kind: exec_storm
    spawn_timeout_s: 15

  - name: vfsstat
    description: "VFS operation counters (read/write/open/create/fsync) via kprobes"
    expected_programs: 5
    workload_kind: vfs_create_write_fsync
    spawn_timeout_s: 15

  - name: tcpconnect
    description: "TCP connect tracing via tracepoints, IPv4/IPv6 support"
    expected_programs: 2
    workload_kind: tcp_connect
    spawn_timeout_s: 15

  - name: bindsnoop
    description: "Socket bind tracing via bind entry plus IPv4/IPv6 return probes"
    expected_programs: 3
    workload_kind: bind_storm
    spawn_timeout_s: 15

measurement_duration_s: 30
smoke_duration_s: 10
attach_timeout_s: 20
