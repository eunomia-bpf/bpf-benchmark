# BCC libbpf-tools E2E benchmark configuration
# Each tool is compiled from runner/repos/bcc/libbpf-tools/ and run as a real
# userspace binary that loads BPF programs into the kernel.
#
# workload_spec.kind must be one of:
#   tcp_connect  -- curl-based HTTP loopback connects
#   block_io     -- explicit block read/write loop on a guest RAM disk
#   scheduler    -- scheduler-stress context-switch storm
#   exec_storm   -- stress-ng --exec execve storm
#   exec_loop    -- deterministic execve loop, optionally dropped to uid 65534
#   file_open    -- fio/stress-ng open-close file storm
#   vfs_create_write_fsync -- create/write/fsync/read/unlink loop on disk-backed temp files
#   bind_storm   -- tight loop of socket.bind() on loopback ephemeral ports

tools:
  - name: tcplife
    workload_spec:
      kind: tcp_connect

  - name: biosnoop
    workload_spec:
      kind: block_io

  - name: runqlat
    workload_spec:
      kind: scheduler

  - name: syscount
    workload_spec:
      kind: file_open
    tool_args: ["-L", "-i", "1"]

  - name: execsnoop
    workload_spec:
      kind: exec_loop
    tool_args: ["-T", "-U", "-u", "65534"]

  - name: opensnoop
    workload_spec:
      kind: file_open

  - name: capable
    workload_spec:
      kind: exec_storm

  - name: vfsstat
    workload_spec:
      kind: vfs_create_write_fsync

  - name: tcpconnect
    workload_spec:
      kind: tcp_connect

  - name: bindsnoop
    workload_spec:
      kind: bind_storm

measurement_duration_s: 30
smoke_duration_s: 10
attach_timeout_s: 20
