events:
  - execve
  - sched_process_exec
  - security_file_open
  - security_socket_connect
require_program_activity: true
preflight_duration_s: 5
measurement_duration_s: 20
smoke_duration_s: 6
sample_count: 5
smoke_sample_count: 2
warmup_duration_s: 4
smoke_warmup_duration_s: 2
latency_probe_count: 8
smoke_latency_probe_count: 3
latency_probe_timeout_s: 5
statistics:
  bootstrap_iterations: 2000
  bootstrap_seed: 20260328
workloads:
  - name: tracee_default
    kind: tracee_default
    command: mixed exec/open/connect workload over {duration}s
    metric: ops/s
    primary_events:
      - execve
      - sched_process_exec
      - security_file_open
      - security_socket_connect
    latency_probe_kind: exec
    latency_probe_events:
      - sched_process_exec
      - execve
