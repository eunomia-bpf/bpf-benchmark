events:
  - read
target_programs:
  - tracepoint__raw_syscalls__sys_enter
  - tracepoint__raw_syscalls__sys_exit
apply_programs:
  - sys_enter_submit
  - sys_exit_submit
workloads:
  - name: read_hotpath
    kind: read
    metric: reads/s
measurement_duration_s: 30
smoke_duration_s: 5
preflight_duration_s: 5
require_program_activity: true
