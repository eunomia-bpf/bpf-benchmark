defaults:
  iterations: 3
  warmups: 1
  repeat: 200
  output_json: corpus/results/vm_corpus.json
  output_md: corpus/results/vm_corpus.md

passes:
  performance:
    - wide_mem
    - rotate
    - cond_select
    - extract
    - endian_fusion
    - map_inline
    - const_prop
    - dce
    - bounds_check_merge
    - skb_load_bytes_spec
    - bulk_memory
  active: performance

profiles:
  dev:
    iterations: 1
    warmups: 0
    repeat: 50
    output_json: corpus/results/dev/vm_corpus.json
  strict:
    iterations: 10
    warmups: 2
    repeat: 500
  ablation_map_inline_only:
    passes:
      active_list: [map_inline]
  ablation_const_prop_only:
    passes:
      active_list: [const_prop]
  ablation_dce_only:
    passes:
      active_list: [dce]
  ablation_map_inline_const_prop:
    passes:
      active_list: [map_inline, const_prop]
  ablation_map_inline_full:
    passes:
      active_list: [map_inline, const_prop, dce]
    repeat: 500
  ablation_wide_mem:
    passes:
      active_list: [wide_mem]
