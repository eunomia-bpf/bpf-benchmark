schema_version: 1
suite_name: macro_apps
defaults:
  duration_s: 1
  repeat: 200

apps:
  - name: bcc/capable
    runner: bcc
    workload:
      corpus: exec_storm
      e2e: exec_storm
    tool: capable

  - name: bcc/execsnoop
    runner: bcc
    workload:
      corpus: exec_storm
      e2e: exec_storm
    tool: execsnoop

  - name: bcc/bindsnoop
    runner: bcc
    workload:
      corpus: bind_storm
      e2e: bind_storm
    tool: bindsnoop

  - name: bcc/biosnoop
    runner: bcc
    workload:
      corpus: fio
      e2e: fio
    tool: biosnoop

  - name: bcc/vfsstat
    runner: bcc
    workload:
      corpus: vfs_create_write_fsync
      e2e: vfs_create_write_fsync
    tool: vfsstat

  - name: bcc/opensnoop
    runner: bcc
    workload:
      corpus: file_open_storm
      e2e: file_open_storm
    tool: opensnoop

  - name: bcc/syscount
    runner: bcc
    workload:
      corpus: file_open_storm
      e2e: file_open_storm
    tool: syscount

  - name: bcc/tcpconnect
    runner: bcc
    workload:
      corpus: network
      e2e: network
    tool: tcpconnect

  - name: bcc/tcplife
    runner: bcc
    workload:
      corpus: network
      e2e: network
    tool: tcplife

  - name: bcc/runqlat
    runner: bcc
    workload:
      corpus: hackbench
      e2e: hackbench
    tool: runqlat

  - name: scx/rusty
    runner: scx
    workload:
      corpus: hackbench
      e2e: hackbench
    scheduler: rusty

  - name: tetragon/default
    runner: tetragon
    workload:
      corpus: exec_storm
      e2e: exec_storm

  - name: katran
    runner: katran
    workload:
      corpus: test_run
      e2e: network

  - name: tracee/default
    runner: tracee
    workload:
      corpus: tracee_default
      e2e: tracee_default

  - name: bpftrace/capable
    runner: bpftrace
    workload:
      corpus: exec_storm
      e2e: exec_storm
    script: capable

  - name: bpftrace/biosnoop
    runner: bpftrace
    workload:
      corpus: fio
      e2e: fio
    script: biosnoop

  - name: bpftrace/vfsstat
    runner: bpftrace
    workload:
      corpus: vfs_create_write_fsync
      e2e: vfs_create_write_fsync
    script: vfsstat

  - name: bpftrace/runqlat
    runner: bpftrace
    workload:
      corpus: hackbench
      e2e: hackbench
    script: runqlat

  - name: bpftrace/tcplife
    runner: bpftrace
    workload:
      corpus: network
      e2e: network
    script: tcplife

  - name: bpftrace/tcpretrans
    runner: bpftrace
    workload:
      corpus: network
      e2e: network
    script: tcpretrans
