  level: support
  prog_type: sched_cls
  io_mode: packet
  test_input: corpus/inputs/macro_dummy_packet_64.bin
  input_size: 64
  programs:
  - name: cls
    description: Linux selftest TC classifier benchmark.
    hypothesis: Kernel selftests provide compact control programs for calibration
      against production datapaths.
