- source: corpus/build/tubular/inet-kern.bpf.o
  repo: tubular
  test_method: attach_trigger
  description: Cloudflare Tubular socket-lookup dispatcher program.
  category: networking
  family: tubular
  level: production
  tags:
  - networking
  - tubular
  - sk_lookup
  - production
  - attach
  prog_type: sk_lookup
