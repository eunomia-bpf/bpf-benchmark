- source: corpus/build/bcc/libbpf-tools/biolatency.bpf.o
  repo: bcc
  test_method: attach_trigger
  category: observability
  family: bcc
  level: production
  trigger: dd if=/dev/zero of=/tmp/_bio_bench bs=4k count=100 conv=fsync 2>/dev/null;
    rm -f /tmp/_bio_bench
  trigger_timeout_seconds: 30
  compile_loader: bpftool_loadall
  programs:
  - name: block_rq_insert_btf
    tags:
    - observability
    - bcc
    - tracing
    - attach
    prog_type: tracing
    section: tp_btf/block_rq_insert
  - name: block_rq_issue_btf
    tags:
    - observability
    - bcc
    - tracing
    - attach
    prog_type: tracing
    section: tp_btf/block_rq_issue
  - name: block_rq_complete_btf
    tags:
    - observability
    - bcc
    - tracing
    - attach
    prog_type: tracing
    section: tp_btf/block_rq_complete
  - name: block_rq_insert
    description: BCC biolatency traces block I/O latency via raw_tp on block_rq events.
    hypothesis: Block I/O raw tracepoints exercise a distinct kernel subsystem from
      syscall/sched tracepoints.
    tags:
    - observability
    - bcc
    - raw_tracepoint
    - production
    - attach
    prog_type: raw_tracepoint
    section: raw_tp/block_rq_insert
  - name: block_rq_issue
    description: BCC biolatency traces block I/O latency via raw_tp on block_rq events.
    hypothesis: Block I/O raw tracepoints exercise a distinct kernel subsystem from
      syscall/sched tracepoints.
    tags:
    - observability
    - bcc
    - raw_tracepoint
    - production
    - attach
    prog_type: raw_tracepoint
    section: raw_tp/block_rq_issue
  - name: block_rq_complete
    description: BCC biolatency traces block I/O latency via raw_tp on block_rq events.
