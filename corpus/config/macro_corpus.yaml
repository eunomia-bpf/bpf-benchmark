- source: corpus/build/bcc/libbpf-tools/bindsnoop.bpf.o
  repo: bcc
  test_method: attach_trigger
  family: bcc
  level: production
  prog_type: kprobe
  trigger_timeout_seconds: 30
  compile_loader: bpftool_loadall
  programs:
  - name: ipv4_bind_entry
    description: BCC bindsnoop traces socket bind calls via kprobe on inet_bind.
    category: networking
    hypothesis: Kprobe pairs on socket operations complement TCP connect tracing.
    tags:
    - networking
    - bcc
    - kprobe
    - production
    - attach
    section: kprobe/inet_bind
    trigger: python3 -c "import socket; [socket.socket(socket.AF_INET, socket.SOCK_STREAM).close()
      for _ in range(200)]" 2>/dev/null || for i in $(seq 200); do /bin/true; done
  - name: ipv4_bind_exit
    description: BCC bindsnoop traces socket bind calls via kprobe on inet_bind.
    category: networking
    hypothesis: Kprobe pairs on socket operations complement TCP connect tracing.
    tags:
    - networking
    - bcc
    - kprobe
    - production
    - attach
    section: kretprobe/inet_bind
    trigger: python3 -c "import socket; [socket.socket(socket.AF_INET, socket.SOCK_STREAM).close()
      for _ in range(200)]" 2>/dev/null || for i in $(seq 200); do /bin/true; done
  - name: ipv6_bind_entry
    category: observability
    tags:
    - observability
    - bcc
