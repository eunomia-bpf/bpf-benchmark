suite_name: macro_corpus

corpus:
  manifest: corpus/repos.yaml
  local_repos: corpus/repos
  inventory: corpus/inventory.json

defaults:
  iterations: 3
  warmups: 1
  repeat: 1
  output: corpus/results/dev/macro_corpus.json

build:
  runner_binary: runner/build/micro_exec
  scanner_binary: daemon/build/bpfrejit-daemon
  bpftool_binary: bpftool

runtimes:
  - name: kernel
    label: kernel eBPF
    mode: kernel
  - name: kernel-rejit
    label: kernel eBPF rejit v2
    mode: kernel-rejit

programs:
  - name: katran_balancer
    description: Meta Katran XDP load balancer ingress datapath.
    source: corpus/build/katran/balancer.bpf.o
    prog_type: xdp
    test_method: bpf_prog_test_run
    program_name: balancer_ingress
    sections: [xdp]
    io_mode: packet
    test_input: corpus/inputs/katran_vip_packet_64.bin
    input_size: 64
    category: networking
    family: katran
    level: production
    hypothesis: Large production XDP load balancers expose meaningful JIT compile and code-size costs.
    tags: [networking, load-balancer, production, xdp]

  - name: calico_xdp_main
    description: Calico XDP fast path for Kubernetes dataplane policy and service handling.
    source: corpus/build/calico/xdp_no_log.bpf.o
    prog_type: xdp
    test_method: bpf_prog_test_run
    program_name: calico_xdp_main
    sections: [xdp]
    io_mode: packet
    test_input: corpus/inputs/macro_dummy_packet_64.bin
    input_size: 64
    category: networking
    family: calico
    level: production
    hypothesis: Medium-sized Kubernetes datapaths should sit between Katran and selftests on compile time and code size.
    tags: [networking, kubernetes, policy, production, xdp]

  - name: calico_tc_maglev
    description: Calico TC Maglev load-balancing program from the host endpoint datapath.
    source: corpus/build/calico/from_hep_debug.bpf.o
    prog_type: sched_cls
    test_method: bpf_prog_test_run
    program_name: calico_tc_maglev
    sections: [tc]
    io_mode: packet
    test_input: corpus/inputs/macro_dummy_packet_64.bin
    input_size: 64
    category: networking
    family: calico
    level: production
    hypothesis: TC datapaths stress a different JIT mix than XDP while remaining replayable via test_run.
    tags: [networking, kubernetes, load-balancer, production, tc]

  - name: suricata_xdp_filter
    description: Suricata XDP hash-based flow filter.
    source: corpus/build/suricata/xdp_filter.bpf.o
    prog_type: xdp
    test_method: bpf_prog_test_run
    program_name: xdp_hashfilter
    sections: [xdp]
    io_mode: packet
    test_input: corpus/inputs/macro_dummy_packet_64.bin
    input_size: 64
    category: security
    family: suricata
    level: production
    hypothesis: Security-oriented XDP filters provide smaller but still realistic map-heavy packet pipelines.
    tags: [security, observability, production, xdp]

  - name: linux_test_tc_cls
    description: Linux selftest TC classifier benchmark.
    source: corpus/build/linux-selftests/test_tc_bpf.bpf.o
    prog_type: sched_cls
    test_method: bpf_prog_test_run
    program_name: cls
    sections: [tc]
    io_mode: packet
    test_input: corpus/inputs/macro_dummy_packet_64.bin
    input_size: 64
    category: selftests
    family: linux-selftests
    level: support
    hypothesis: Kernel selftests provide compact control programs for calibration against production datapaths.
    tags: [selftests, tc, control]

  - name: linux_test_tcx_pkt_ptr
    description: Linux selftest TCX ingress packet pointer program.
    source: corpus/build/linux-selftests/test_tc_bpf.bpf.o
    prog_type: sched_cls
    test_method: bpf_prog_test_run
    program_name: pkt_ptr
    sections: [tcx]
    io_mode: packet
    test_input: corpus/inputs/macro_dummy_packet_64.bin
    input_size: 64
    category: selftests
    family: linux-selftests
    level: support
    hypothesis: TCX programs give a smaller modern ingress baseline against production TC code.
    tags: [selftests, tcx, control]

  - name: linux_xdp_synproxy
    description: Linux selftest XDP SYN proxy.
    source: corpus/build/linux-selftests/xdp_synproxy_kern.bpf.o
    prog_type: xdp
    test_method: bpf_prog_test_run
    program_name: syncookie_xdp
    sections: [xdp]
    io_mode: packet
    test_input: corpus/inputs/macro_dummy_packet_64.bin
    input_size: 64
    category: selftests
    family: linux-selftests
    level: support
    hypothesis: The in-kernel SYN proxy is a realistic but still self-contained stress case for XDP control flow.
    tags: [selftests, networking, synproxy, xdp]

  - name: linux_tc_synproxy
    description: Linux selftest TC SYN proxy.
    source: corpus/build/linux-selftests/xdp_synproxy_kern.bpf.o
    prog_type: sched_cls
    test_method: bpf_prog_test_run
    program_name: syncookie_tc
    sections: [tc]
    io_mode: packet
    test_input: corpus/inputs/macro_dummy_packet_64.bin
    input_size: 64
    category: selftests
    family: linux-selftests
    level: support
    hypothesis: The TC SYN proxy complements XDP with a verifier- and helper-heavy TC path.
    tags: [selftests, networking, synproxy, tc]

  - name: systemd_sysctl_monitor
    description: systemd cgroup/sysctl monitor attached to root cgroup and triggered via sysctl reads.
    source: corpus/build/systemd/sysctl-monitor.bpf.o
    prog_type: cgroup_sysctl
    test_method: attach_trigger
    compile_loader: bpftool_loadall
    program_names: [sysctl_monitor]
    sections: [cgroup/sysctl]
    trigger: "for i in $(seq 200); do cat /proc/sys/kernel/hostname >/dev/null; done"
    trigger_timeout_seconds: 30
    category: resource-control
    family: systemd
    level: production
    hypothesis: Cgroup sysctl hooks exercise a realistic attach-trigger path with bpf_stats measurement.
    tags: [systemd, cgroup, production, attach]

  - name: datadog_oom_kill
    description: Datadog OOM kill kprobe attached and triggered via controlled cgroup OOM.
    source: corpus/build/datadog-agent/oom-kill-kern.bpf.o
    prog_type: kprobe
    test_method: attach_trigger
    compile_loader: bpftool_loadall
    program_names: [kprobe__oom_kill_process]
    sections: [kprobe/oom_kill_process]
    trigger: "echo +memory > /sys/fs/cgroup/cgroup.subtree_control 2>/dev/null; mkdir -p /sys/fs/cgroup/oom_bench 2>/dev/null; echo 2097152 > /sys/fs/cgroup/oom_bench/memory.max 2>/dev/null; (echo $BASHPID > /sys/fs/cgroup/oom_bench/cgroup.procs 2>/dev/null && exec head -c 8388608 /dev/zero) 2>/dev/null; rmdir /sys/fs/cgroup/oom_bench 2>/dev/null; true"
    trigger_timeout_seconds: 30
    category: observability
    family: datadog-agent
    level: production
    hypothesis: Production kprobe probes exercise attach-trigger with bpf_stats for accurate JIT measurement.
    tags: [observability, datadog, kprobe, production, attach]

  - name: tracee_lsm_bpf
    description: Tracee LSM probe for BPF capability checks.
    source: corpus/build/tracee/lsm_check.bpf.o
    prog_type: lsm
    test_method: attach_trigger
    program_name: lsm_bpf_check
    trigger: "bpftool prog show >/dev/null"
    trigger_timeout_seconds: 20
    category: security
    family: tracee
    level: production
    hypothesis: Attached LSM probes exercise a realistic live-attach and trigger path absent from test_run-only suites.
    tags: [security, observability, tracee, production, attach]

  - name: tetragon_execve
    description: Tetragon execve tracepoint pipeline loaded, attached, and triggered via execve syscalls.
    source: corpus/build/tetragon/bpf_execve_event.bpf.o
    prog_type: tracepoint
    test_method: attach_trigger
    compile_loader: bpftool_loadall
    program_names: [event_execve, execve_rate, execve_send]
    trigger: "for i in $(seq 200); do /bin/true; done"
    trigger_timeout_seconds: 30
    category: security
    family: tetragon
    level: production
    hypothesis: Production tracepoint pipelines exercise a realistic live-attach path with bpf_stats execution measurement.
    tags: [security, observability, tetragon, production, attach]

  - name: coroot_process_lifecycle
    description: Coroot node agent process-lifecycle tracer loaded, selectively attached, and triggered via fork+exit.
    source: corpus/build/coroot-node-agent/ebpf.bpf.o
    prog_type: tracepoint
    test_method: attach_trigger
    compile_loader: bpftool_loadall
    program_names: [task_newtask, sched_process_exit, oom_mark_victim]
    trigger: "for i in $(seq 200); do /bin/true; done"
    trigger_timeout_seconds: 30
    category: observability
    family: coroot-node-agent
    level: production
    hypothesis: Large multi-fragment node agents exercise selective attach with bpf_stats for execution measurement on tracepoint programs.
    tags: [observability, coroot, tracepoint, production, attach]
