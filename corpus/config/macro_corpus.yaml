suite_name: macro_corpus

corpus:
  manifest: corpus/repos.yaml
  local_repos: corpus/repos
  inventory: corpus/inventory.json

defaults:
  iterations: 3
  warmups: 1
  repeat: 1
  output: corpus/results/dev/macro_corpus.json

build:
  runner_binary: runner/build/micro_exec
  daemon_binary: daemon/target/release/bpfrejit-daemon
  bpftool_binary: bpftool

runtimes:
  - name: kernel
    label: kernel eBPF
    mode: kernel
  - name: kernel-rejit
    label: kernel eBPF rejit v2
    mode: kernel-rejit

programs:
  - name: katran_balancer
    description: Meta Katran XDP load balancer ingress datapath.
    source: corpus/build/katran/balancer.bpf.o
    prog_type: xdp
    test_method: bpf_prog_test_run
    program_name: balancer_ingress
    sections: [xdp]
    io_mode: packet
    test_input: corpus/inputs/katran_vip_packet_64.bin
    input_size: 64
    category: networking
    family: katran
    level: production
    hypothesis: Large production XDP load balancers expose meaningful JIT compile and code-size costs.
    tags: [networking, load-balancer, production, xdp]

  - name: calico_xdp_main
    description: Calico XDP fast path for Kubernetes dataplane policy and service handling.
    source: corpus/build/calico/xdp_no_log.bpf.o
    prog_type: xdp
    test_method: bpf_prog_test_run
    program_name: calico_xdp_main
    sections: [xdp]
    io_mode: packet
    test_input: corpus/inputs/macro_dummy_packet_64.bin
    input_size: 64
    category: networking
    family: calico
    level: production
    hypothesis: Medium-sized Kubernetes datapaths should sit between Katran and selftests on compile time and code size.
    tags: [networking, kubernetes, policy, production, xdp]

  - name: calico_tc_maglev
    description: Calico TC Maglev load-balancing program from the host endpoint datapath.
    source: corpus/build/calico/from_hep_debug.bpf.o
    prog_type: sched_cls
    test_method: bpf_prog_test_run
    program_name: calico_tc_maglev
    sections: [tc]
    io_mode: packet
    test_input: corpus/inputs/macro_dummy_packet_64.bin
    input_size: 64
    category: networking
    family: calico
    level: production
    hypothesis: TC datapaths stress a different JIT mix than XDP while remaining replayable via test_run.
    tags: [networking, kubernetes, load-balancer, production, tc]

  - name: suricata_xdp_filter
    description: Suricata XDP hash-based flow filter.
    source: corpus/build/suricata/xdp_filter.bpf.o
    prog_type: xdp
    test_method: bpf_prog_test_run
    program_name: xdp_hashfilter
    sections: [xdp]
    io_mode: packet
    test_input: corpus/inputs/macro_dummy_packet_64.bin
    input_size: 64
    category: security
    family: suricata
    level: production
    hypothesis: Security-oriented XDP filters provide smaller but still realistic map-heavy packet pipelines.
    tags: [security, observability, production, xdp]

  - name: linux_test_tc_cls
    description: Linux selftest TC classifier benchmark.
    source: corpus/build/linux-selftests/test_tc_bpf.bpf.o
    prog_type: sched_cls
    test_method: bpf_prog_test_run
    program_name: cls
    sections: [tc]
    io_mode: packet
    test_input: corpus/inputs/macro_dummy_packet_64.bin
    input_size: 64
    category: selftests
    family: linux-selftests
    level: support
    hypothesis: Kernel selftests provide compact control programs for calibration against production datapaths.
    tags: [selftests, tc, control]

  - name: linux_test_tcx_pkt_ptr
    description: Linux selftest TCX ingress packet pointer program.
    source: corpus/build/linux-selftests/test_tc_bpf.bpf.o
    prog_type: sched_cls
    test_method: bpf_prog_test_run
    program_name: pkt_ptr
    sections: [tcx]
    io_mode: packet
    test_input: corpus/inputs/macro_dummy_packet_64.bin
    input_size: 64
    category: selftests
    family: linux-selftests
    level: support
    hypothesis: TCX programs give a smaller modern ingress baseline against production TC code.
    tags: [selftests, tcx, control]

  - name: linux_xdp_synproxy
    description: Linux selftest XDP SYN proxy.
    source: corpus/build/linux-selftests/xdp_synproxy_kern.bpf.o
    prog_type: xdp
    test_method: bpf_prog_test_run
    program_name: syncookie_xdp
    sections: [xdp]
    io_mode: packet
    test_input: corpus/inputs/macro_dummy_packet_64.bin
    input_size: 64
    category: selftests
    family: linux-selftests
    level: support
    hypothesis: The in-kernel SYN proxy is a realistic but still self-contained stress case for XDP control flow.
    tags: [selftests, networking, synproxy, xdp]

  - name: linux_tc_synproxy
    description: Linux selftest TC SYN proxy.
    source: corpus/build/linux-selftests/xdp_synproxy_kern.bpf.o
    prog_type: sched_cls
    test_method: bpf_prog_test_run
    program_name: syncookie_tc
    sections: [tc]
    io_mode: packet
    test_input: corpus/inputs/macro_dummy_packet_64.bin
    input_size: 64
    category: selftests
    family: linux-selftests
    level: support
    hypothesis: The TC SYN proxy complements XDP with a verifier- and helper-heavy TC path.
    tags: [selftests, networking, synproxy, tc]

  - name: systemd_sysctl_monitor
    description: systemd cgroup/sysctl monitor attached to root cgroup and triggered via sysctl reads.
    source: corpus/build/systemd/sysctl-monitor.bpf.o
    prog_type: cgroup_sysctl
    test_method: attach_trigger
    compile_loader: bpftool_loadall
    program_names: [sysctl_monitor]
    sections: [cgroup/sysctl]
    trigger: "for i in $(seq 200); do cat /proc/sys/kernel/hostname >/dev/null; done"
    trigger_timeout_seconds: 30
    category: resource-control
    family: systemd
    level: production
    hypothesis: Cgroup sysctl hooks exercise a realistic attach-trigger path with bpf_stats measurement.
    tags: [systemd, cgroup, production, attach]

  - name: datadog_oom_kill
    description: Datadog OOM kill kprobe attached and triggered via controlled cgroup OOM.
    source: corpus/build/datadog-agent/oom-kill-kern.bpf.o
    prog_type: kprobe
    test_method: attach_trigger
    compile_loader: bpftool_loadall
    program_names: [kprobe__oom_kill_process]
    sections: [kprobe/oom_kill_process]
    trigger: "echo +memory > /sys/fs/cgroup/cgroup.subtree_control 2>/dev/null; mkdir -p /sys/fs/cgroup/oom_bench 2>/dev/null; echo 2097152 > /sys/fs/cgroup/oom_bench/memory.max 2>/dev/null; (echo $BASHPID > /sys/fs/cgroup/oom_bench/cgroup.procs 2>/dev/null && exec head -c 8388608 /dev/zero) 2>/dev/null; rmdir /sys/fs/cgroup/oom_bench 2>/dev/null; true"
    trigger_timeout_seconds: 30
    category: observability
    family: datadog-agent
    level: production
    hypothesis: Production kprobe probes exercise attach-trigger with bpf_stats for accurate JIT measurement.
    tags: [observability, datadog, kprobe, production, attach]

  - name: tracee_lsm_bpf
    description: Tracee LSM probe for BPF capability checks.
    source: corpus/build/tracee/lsm_check.bpf.o
    prog_type: lsm
    test_method: attach_trigger
    program_name: lsm_bpf_check
    trigger: "bpftool prog show >/dev/null"
    trigger_timeout_seconds: 20
    category: security
    family: tracee
    level: production
    hypothesis: Attached LSM probes exercise a realistic live-attach and trigger path absent from test_run-only suites.
    tags: [security, observability, tracee, production, attach]

  - name: tetragon_execve
    description: Tetragon execve tracepoint pipeline loaded, attached, and triggered via execve syscalls.
    source: corpus/build/tetragon/bpf_execve_event.bpf.o
    prog_type: tracepoint
    test_method: attach_trigger
    compile_loader: bpftool_loadall
    program_names: [event_execve, execve_rate, execve_send]
    trigger: "for i in $(seq 200); do /bin/true; done"
    trigger_timeout_seconds: 30
    category: security
    family: tetragon
    level: production
    hypothesis: Production tracepoint pipelines exercise a realistic live-attach path with bpf_stats execution measurement.
    tags: [security, observability, tetragon, production, attach]

  - name: coroot_process_lifecycle
    description: Coroot node agent process-lifecycle tracer loaded, selectively attached, and triggered via fork+exit.
    source: corpus/build/coroot-node-agent/ebpf.bpf.o
    prog_type: tracepoint
    test_method: attach_trigger
    compile_loader: bpftool_loadall
    program_names: [task_newtask, sched_process_exit, oom_mark_victim]
    trigger: "for i in $(seq 200); do /bin/true; done"
    trigger_timeout_seconds: 30
    category: observability
    family: coroot-node-agent
    level: production
    hypothesis: Large multi-fragment node agents exercise selective attach with bpf_stats for execution measurement on tracepoint programs.
    tags: [observability, coroot, tracepoint, production, attach]

  # -----------------------------------------------------------------------
  # BCC libbpf-tools: tracepoint programs
  # -----------------------------------------------------------------------

  - name: bcc_execsnoop
    description: BCC execsnoop traces process execution via execve tracepoints.
    source: corpus/build/bcc/libbpf-tools/execsnoop.bpf.o
    prog_type: tracepoint
    test_method: attach_trigger
    compile_loader: bpftool_loadall
    program_names: [tracepoint__syscalls__sys_enter_execve, tracepoint__syscalls__sys_exit_execve]
    sections: [tracepoint/syscalls/sys_enter_execve, tracepoint/syscalls/sys_exit_execve]
    trigger: "for i in $(seq 200); do /bin/true; done"
    trigger_timeout_seconds: 30
    category: observability
    family: bcc
    level: production
    hypothesis: Syscall tracepoint pairs are the most common observability pattern; execsnoop is the canonical example.
    tags: [observability, bcc, tracepoint, production, attach]

  - name: bcc_opensnoop
    description: BCC opensnoop traces file opens via openat tracepoints.
    source: corpus/build/bcc/libbpf-tools/opensnoop.bpf.o
    prog_type: tracepoint
    test_method: attach_trigger
    compile_loader: bpftool_loadall
    program_names: [tracepoint__syscalls__sys_enter_openat, tracepoint__syscalls__sys_exit_openat]
    sections: [tracepoint/syscalls/sys_enter_openat, tracepoint/syscalls/sys_exit_openat]
    trigger: "for i in $(seq 200); do ls /tmp >/dev/null 2>&1; done"
    trigger_timeout_seconds: 30
    category: observability
    family: bcc
    level: production
    hypothesis: File-open tracepoints are high-frequency in production workloads.
    tags: [observability, bcc, tracepoint, production, attach]

  - name: bcc_sigsnoop
    description: BCC sigsnoop traces signal delivery via kill/tkill/tgkill tracepoints.
    source: corpus/build/bcc/libbpf-tools/sigsnoop.bpf.o
    prog_type: tracepoint
    test_method: attach_trigger
    compile_loader: bpftool_loadall
    program_names: [kill_entry, kill_exit, sig_trace]
    sections: [tracepoint/syscalls/sys_enter_kill, tracepoint/syscalls/sys_exit_kill, tracepoint/signal/signal_generate]
    trigger: "for i in $(seq 200); do kill -0 $$ 2>/dev/null; done"
    trigger_timeout_seconds: 30
    category: observability
    family: bcc
    level: production
    hypothesis: Signal tracing covers both syscall and kernel-internal tracepoint categories.
    tags: [observability, bcc, tracepoint, production, attach]

  - name: bcc_exitsnoop
    description: BCC exitsnoop traces process exits via sched_process_exit tracepoint.
    source: corpus/build/bcc/libbpf-tools/exitsnoop.bpf.o
    prog_type: tracepoint
    test_method: attach_trigger
    compile_loader: bpftool_loadall
    program_names: [sched_process_exit]
    sections: [tracepoint/sched/sched_process_exit]
    trigger: "for i in $(seq 200); do /bin/true; done"
    trigger_timeout_seconds: 30
    category: observability
    family: bcc
    level: production
    hypothesis: Single-tracepoint programs are the simplest attach_trigger case.
    tags: [observability, bcc, tracepoint, production, attach]

  - name: bcc_futexctn
    description: BCC futexctn traces futex contention via syscall tracepoints.
    source: corpus/build/bcc/libbpf-tools/futexctn.bpf.o
    prog_type: tracepoint
    test_method: attach_trigger
    compile_loader: bpftool_loadall
    program_names: [futex_enter, futex_exit]
    sections: [tracepoint/syscalls/sys_enter_futex, tracepoint/syscalls/sys_exit_futex]
    trigger: "for i in $(seq 200); do /bin/true; done"
    trigger_timeout_seconds: 30
    category: observability
    family: bcc
    level: production
    hypothesis: Futex tracepoints exercise the enter/exit pair pattern on a different syscall.
    tags: [observability, bcc, tracepoint, production, attach]

  - name: bcc_syscount
    description: BCC syscount counts syscalls via raw_syscalls tracepoints.
    source: corpus/build/bcc/libbpf-tools/syscount.bpf.o
    prog_type: tracepoint
    test_method: attach_trigger
    compile_loader: bpftool_loadall
    program_names: [sys_enter, sys_exit]
    sections: [tracepoint/raw_syscalls/sys_enter, tracepoint/raw_syscalls/sys_exit]
    trigger: "for i in $(seq 200); do /bin/true; done"
    trigger_timeout_seconds: 30
    category: observability
    family: bcc
    level: production
    hypothesis: raw_syscalls tracepoints fire on every syscall, producing the highest event rates.
    tags: [observability, bcc, tracepoint, production, attach]

  - name: bcc_tcplife
    description: BCC tcplife traces TCP connection lifetimes via inet_sock_set_state tracepoint.
    source: corpus/build/bcc/libbpf-tools/tcplife.bpf.o
    prog_type: tracepoint
    test_method: attach_trigger
    compile_loader: bpftool_loadall
    program_names: [inet_sock_set_state]
    sections: [tracepoint/sock/inet_sock_set_state]
    trigger: "for i in $(seq 50); do curl -s --connect-timeout 1 http://127.0.0.1/ >/dev/null 2>&1 || true; done"
    trigger_timeout_seconds: 30
    category: networking
    family: bcc
    level: production
    hypothesis: Sock tracepoints measure TCP-specific kernel paths distinct from syscall tracepoints.
    tags: [networking, bcc, tracepoint, production, attach]

  # -----------------------------------------------------------------------
  # BCC libbpf-tools: kprobe programs
  # -----------------------------------------------------------------------

  - name: bcc_tcpconnect
    description: BCC tcpconnect traces TCP connect calls via kprobe/kretprobe on tcp_v4_connect.
    source: corpus/build/bcc/libbpf-tools/tcpconnect.bpf.o
    prog_type: kprobe
    test_method: attach_trigger
    compile_loader: bpftool_loadall
    program_names: [tcp_v4_connect, tcp_v4_connect_ret]
    sections: [kprobe/tcp_v4_connect, kretprobe/tcp_v4_connect]
    trigger: "for i in $(seq 50); do curl -s --connect-timeout 1 http://127.0.0.1/ >/dev/null 2>&1 || true; done"
    trigger_timeout_seconds: 30
    category: networking
    family: bcc
    level: production
    hypothesis: Kprobe/kretprobe pairs on networking functions are the second most common observability pattern.
    tags: [networking, bcc, kprobe, production, attach]

  - name: bcc_bindsnoop
    description: BCC bindsnoop traces socket bind calls via kprobe on inet_bind.
    source: corpus/build/bcc/libbpf-tools/bindsnoop.bpf.o
    prog_type: kprobe
    test_method: attach_trigger
    compile_loader: bpftool_loadall
    program_names: [ipv4_bind_entry, ipv4_bind_exit]
    sections: [kprobe/inet_bind, kretprobe/inet_bind]
    trigger: "python3 -c \"import socket; [socket.socket(socket.AF_INET, socket.SOCK_STREAM).close() for _ in range(200)]\" 2>/dev/null || for i in $(seq 200); do /bin/true; done"
    trigger_timeout_seconds: 30
    category: networking
    family: bcc
    level: production
    hypothesis: Kprobe pairs on socket operations complement TCP connect tracing.
    tags: [networking, bcc, kprobe, production, attach]

  - name: bcc_capable
    description: BCC capable traces capability checks via kprobe on cap_capable.
    source: corpus/build/bcc/libbpf-tools/capable.bpf.o
    prog_type: kprobe
    test_method: attach_trigger
    compile_loader: bpftool_loadall
    program_names: [kprobe__cap_capable_entry, kprobe__cap_capable_exit]
    sections: [kprobe/cap_capable, kretprobe/cap_capable]
    trigger: "for i in $(seq 200); do /bin/true; done"
    trigger_timeout_seconds: 30
    category: security
    family: bcc
    level: production
    hypothesis: Security-critical kernel functions are high-frequency kprobe targets in production.
    tags: [security, bcc, kprobe, production, attach]

  - name: bcc_filelife
    description: BCC filelife traces file creation/deletion via kprobes on VFS functions.
    source: corpus/build/bcc/libbpf-tools/filelife.bpf.o
    prog_type: kprobe
    test_method: attach_trigger
    compile_loader: bpftool_loadall
    program_names: [vfs_create, vfs_open, vfs_unlink, vfs_unlink_ret]
    sections: [kprobe/vfs_create, kprobe/vfs_open, kprobe/vfs_unlink, kretprobe/vfs_unlink]
    trigger: "for i in $(seq 200); do tmp=$(mktemp) && rm -f $tmp; done"
    trigger_timeout_seconds: 30
    category: observability
    family: bcc
    level: production
    hypothesis: VFS kprobes exercise multi-function kprobe attachment on filesystem operations.
    tags: [observability, bcc, kprobe, production, attach]

  - name: bcc_slabratetop
    description: BCC slabratetop traces slab allocation via kprobe on kmem_cache_alloc.
    source: corpus/build/bcc/libbpf-tools/slabratetop.bpf.o
    prog_type: kprobe
    test_method: attach_trigger
    compile_loader: bpftool_loadall
    program_names: [kmem_cache_alloc]
    sections: [kprobe/kmem_cache_alloc]
    trigger: "for i in $(seq 200); do /bin/true; done"
    trigger_timeout_seconds: 30
    category: observability
    family: bcc
    level: production
    hypothesis: Memory allocator kprobes fire at extremely high rates in the kernel.
    tags: [observability, bcc, kprobe, production, attach]

  # -----------------------------------------------------------------------
  # BCC libbpf-tools: raw_tracepoint programs (from dual tp_btf/raw_tp objects)
  # -----------------------------------------------------------------------

  - name: bcc_biolatency
    description: BCC biolatency traces block I/O latency via raw_tp on block_rq events.
    source: corpus/build/bcc/libbpf-tools/biolatency.bpf.o
    prog_type: raw_tracepoint
    test_method: attach_trigger
    compile_loader: bpftool_loadall
    program_names: [block_rq_insert, block_rq_issue, block_rq_complete]
    sections: [raw_tp/block_rq_insert, raw_tp/block_rq_issue, raw_tp/block_rq_complete]
    trigger: "dd if=/dev/zero of=/tmp/_bio_bench bs=4k count=100 conv=fsync 2>/dev/null; rm -f /tmp/_bio_bench"
    trigger_timeout_seconds: 30
    category: observability
    family: bcc
    level: production
    hypothesis: Block I/O raw tracepoints exercise a distinct kernel subsystem from syscall/sched tracepoints.
    tags: [observability, bcc, raw_tracepoint, production, attach]

  - name: bcc_runqlat
    description: BCC runqlat traces scheduler run queue latency via raw_tp on sched events.
    source: corpus/build/bcc/libbpf-tools/runqlat.bpf.o
    prog_type: raw_tracepoint
    test_method: attach_trigger
    compile_loader: bpftool_loadall
    program_names: [handle_sched_wakeup, handle_sched_wakeup_new, handle_sched_switch]
    sections: [raw_tp/sched_wakeup, raw_tp/sched_wakeup_new, raw_tp/sched_switch]
    trigger: "for i in $(seq 200); do /bin/true; done"
    trigger_timeout_seconds: 30
    category: observability
    family: bcc
    level: production
    hypothesis: Scheduler raw tracepoints fire at very high rates and exercise the raw_tp attach path.
    tags: [observability, bcc, raw_tracepoint, production, attach]

  - name: bcc_hardirqs
    description: BCC hardirqs traces hardware interrupt latency via raw_tp on irq events.
    source: corpus/build/bcc/libbpf-tools/hardirqs.bpf.o
    prog_type: raw_tracepoint
    test_method: attach_trigger
    compile_loader: bpftool_loadall
    program_names: [irq_handler_entry, irq_handler_exit]
    sections: [raw_tp/irq_handler_entry, raw_tp/irq_handler_exit]
    trigger: "for i in $(seq 200); do ls /tmp >/dev/null 2>&1; done"
    trigger_timeout_seconds: 30
    category: observability
    family: bcc
    level: production
    hypothesis: IRQ tracepoints measure interrupt-context BPF execution overhead.
    tags: [observability, bcc, raw_tracepoint, production, attach]

  - name: bcc_softirqs
    description: BCC softirqs traces software interrupt latency via raw_tp on softirq events.
    source: corpus/build/bcc/libbpf-tools/softirqs.bpf.o
    prog_type: raw_tracepoint
    test_method: attach_trigger
    compile_loader: bpftool_loadall
    program_names: [softirq_entry, softirq_exit]
    sections: [raw_tp/softirq_entry, raw_tp/softirq_exit]
    trigger: "for i in $(seq 200); do ls /tmp >/dev/null 2>&1; done"
    trigger_timeout_seconds: 30
    category: observability
    family: bcc
    level: production
    hypothesis: Softirq tracepoints complement hardirqs with a different interrupt execution context.
    tags: [observability, bcc, raw_tracepoint, production, attach]

  # -----------------------------------------------------------------------
  # libbpf-bootstrap: tracepoint programs
  # -----------------------------------------------------------------------

  - name: libbpf_bootstrap
    description: libbpf-bootstrap process exec/exit tracer via tp/sched tracepoints.
    source: corpus/build/libbpf-bootstrap/examples/c/bootstrap.bpf.o
    prog_type: tracepoint
    test_method: attach_trigger
    compile_loader: bpftool_loadall
    program_names: [handle_exec, handle_exit]
    sections: [tp/sched/sched_process_exec, tp/sched/sched_process_exit]
    trigger: "for i in $(seq 200); do /bin/true; done"
    trigger_timeout_seconds: 30
    category: observability
    family: libbpf-bootstrap
    level: support
    hypothesis: The canonical libbpf-bootstrap example provides a minimal tracepoint baseline.
    tags: [observability, libbpf-bootstrap, tracepoint, support, attach]

  - name: libbpf_minimal
    description: libbpf-bootstrap minimal tracepoint on sys_enter_write.
    source: corpus/build/libbpf-bootstrap/examples/c/minimal.bpf.o
    prog_type: tracepoint
    test_method: attach_trigger
    compile_loader: bpftool_loadall
    program_names: [handle_tp]
    sections: [tp/syscalls/sys_enter_write]
    trigger: "for i in $(seq 200); do echo test > /dev/null; done"
    trigger_timeout_seconds: 30
    category: observability
    family: libbpf-bootstrap
    level: support
    hypothesis: Single-tracepoint minimal program gives the lowest-overhead attach_trigger baseline.
    tags: [observability, libbpf-bootstrap, tracepoint, support, attach]

  # -----------------------------------------------------------------------
  # libbpf-bootstrap: kprobe programs
  # -----------------------------------------------------------------------

  - name: libbpf_kprobe
    description: libbpf-bootstrap kprobe/kretprobe on do_unlinkat.
    source: corpus/build/libbpf-bootstrap/examples/c/kprobe.bpf.o
    prog_type: kprobe
    test_method: attach_trigger
    compile_loader: bpftool_loadall
    program_names: [do_unlinkat, do_unlinkat_exit]
    sections: [kprobe/do_unlinkat, kretprobe/do_unlinkat]
    trigger: "for i in $(seq 200); do tmp=$(mktemp) && rm -f $tmp; done"
    trigger_timeout_seconds: 30
    category: observability
    family: libbpf-bootstrap
    level: support
    hypothesis: Minimal kprobe pair provides a clean kprobe attach baseline.
    tags: [observability, libbpf-bootstrap, kprobe, support, attach]

  # -----------------------------------------------------------------------
  # libbpf-bootstrap: fentry/fexit programs
  # -----------------------------------------------------------------------

  - name: libbpf_fentry
    description: libbpf-bootstrap fentry/fexit on do_unlinkat.
    source: corpus/build/libbpf-bootstrap/examples/c/fentry.bpf.o
    prog_type: tracing
    test_method: attach_trigger
    compile_loader: bpftool_loadall
    program_names: [do_unlinkat, do_unlinkat_exit]
    sections: [fentry/do_unlinkat, fexit/do_unlinkat]
    trigger: "for i in $(seq 200); do tmp=$(mktemp) && rm -f $tmp; done"
    trigger_timeout_seconds: 30
    category: observability
    family: libbpf-bootstrap
    level: support
