schema_version: 2
suite_name: macro_corpus
defaults:
  iterations: 3
  warmups: 1
  repeat: 1
  output: corpus/results/dev/macro_corpus.json
build:
  runner_binary: runner/build/micro_exec
  daemon_binary: daemon/target/release/bpfrejit-daemon
  bpftool_binary: bpftool
runtimes:
- name: kernel
  label: kernel eBPF
  mode: kernel
- name: kernel-rejit
  label: kernel eBPF rejit v2
  mode: kernel-rejit
optional_manifests:
- path: corpus/config/macro_corpus_linux_selftests.yaml
  description: Opt-in linux-selftests corpus entries kept out of the default
    production macro corpus.
repos:
  tracee:
    loader: app-native
    loader_binary: e2e/cases/tracee/bin/tracee
    loader_setup_script: e2e/cases/tracee/setup.sh
    loader_args:
    - --install-path
    - /tmp/tracee
objects:
# Optional object fields include:
# - fixture_path: corpus/fixtures/<repo>/<object>/<program>.json
- source: corpus/build/KubeArmor/enforcer.bpf.o
  repo: KubeArmor
  test_method: attach_trigger
  category: security
  level: production
  prog_type: lsm
  trigger_timeout_seconds: 30
  compile_loader: bpftool_loadall
  programs:
  - name: enforce_proc
    description: KubeArmor LSM enforcement bundle for process, file, and capability
      checks.
    family: kubearmor
    tags:
    - security
    - kubearmor
    - lsm
    - production
    - attach
    section: lsm/bprm_check_security
    trigger: for i in $(seq 200); do /bin/true >/dev/null; cat /etc/hosts >/dev/null;
      done
  - name: enforce_net_create
    family: KubeArmor
    tags:
    - security
    - KubeArmor
    - lsm
    - attach
    section: lsm/socket_create
    trigger: for i in $(seq 50); do curl -s --connect-timeout 1 http://127.0.0.1/
      >/dev/null 2>&1 || true; done
  - name: enforce_net_connect
    family: KubeArmor
    tags:
    - security
    - KubeArmor
    - lsm
    - attach
    section: lsm/socket_connect
    trigger: for i in $(seq 50); do curl -s --connect-timeout 1 http://127.0.0.1/
      >/dev/null 2>&1 || true; done
  - name: enforce_net_accept
    family: KubeArmor
    tags:
    - security
    - KubeArmor
    - lsm
    - attach
    section: lsm/socket_accept
    trigger: for i in $(seq 50); do curl -s --connect-timeout 1 http://127.0.0.1/
      >/dev/null 2>&1 || true; done
  - name: enforce_file
    description: KubeArmor LSM enforcement bundle for process, file, and capability
      checks.
    family: kubearmor
    tags:
    - security
    - kubearmor
    - lsm
    - production
    - attach
    section: lsm/file_open
    trigger: for i in $(seq 200); do /bin/true >/dev/null; cat /etc/hosts >/dev/null;
      done
  - name: enforce_file_perm
    family: KubeArmor
    tags:
    - security
    - KubeArmor
    - lsm
    - attach
    section: lsm/file_permission
    trigger: for i in $(seq 50); do curl -s --connect-timeout 1 http://127.0.0.1/
      >/dev/null 2>&1 || true; done
  - name: enforce_cap
    description: KubeArmor LSM enforcement bundle for process, file, and capability
      checks.
