- source: corpus/build/bcc/libbpf-tools/bashreadline.bpf.o
  repo: bcc
  test_method: attach_trigger
  category: observability
  family: bcc
  level: production
  tags:
  - observability
  - bcc
  - kprobe
  - attach
  prog_type: kprobe
  section: uretprobe/readline
