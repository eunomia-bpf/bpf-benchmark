- source: corpus/build/datadog-agent/oom-kill-kern.bpf.o
  repo: datadog-agent
  test_method: attach_trigger
  description: Datadog OOM kill kprobe attached and triggered via controlled cgroup
    OOM.
  category: observability
  family: datadog-agent
  level: production
  hypothesis: Production kprobe probes exercise attach-trigger with bpf_stats for
    accurate JIT measurement.
  tags:
  - observability
  - datadog
  - kprobe
  - production
  - attach
  prog_type: kprobe
  section: kprobe/oom_kill_process
  trigger: echo +memory > /sys/fs/cgroup/cgroup.subtree_control 2>/dev/null; mkdir
    -p /sys/fs/cgroup/oom_bench 2>/dev/null; echo 2097152 > /sys/fs/cgroup/oom_bench/memory.max
    2>/dev/null; (echo $BASHPID > /sys/fs/cgroup/oom_bench/cgroup.procs 2>/dev/null
    && exec head -c 8388608 /dev/zero) 2>/dev/null; rmdir /sys/fs/cgroup/oom_bench
    2>/dev/null; true
  trigger_timeout_seconds: 30
  compile_loader: bpftool_loadall
  programs:
  - name: kprobe__oom_kill_process
